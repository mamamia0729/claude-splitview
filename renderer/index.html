<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude SplitView Toolbar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="toolbar">
    <!-- Left: App title + pane indicators -->
    <div class="toolbar-left">
      <span class="app-title">Claude SplitView</span>
      <div class="pane-indicators" id="paneIndicators">
        <!-- Dynamically populated -->
      </div>
    </div>

    <!-- Center: Drag region (lets you drag the window) -->
    <div class="toolbar-center drag-region"></div>

    <!-- Right: Action buttons -->
    <div class="toolbar-right">
      <button class="tool-btn" id="btnAdd" title="Add pane (Ctrl+N)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Add Pane</span>
      </button>

      <button class="tool-btn" id="btnClose" title="Close active pane (Ctrl+W)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Close Pane</span>
      </button>

      <div class="separator"></div>

      <button class="tool-btn" id="btnReset" title="Equal split (Ctrl+\\)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="2" width="6" height="12" rx="1" stroke="currentColor" stroke-width="1.2"/>
          <rect x="9" y="2" width="6" height="12" rx="1" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <span>Equal Split</span>
      </button>

      <button class="tool-btn" id="btnReload" title="Reload active pane">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M13 8A5 5 0 1 1 8 3m0 0l2.5-2M8 3l2.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Reload</span>
      </button>
    </div>
  </div>

  <!-- Invisible drag overlay for resizer (appears during drag) -->
  <div class="drag-overlay" id="dragOverlay"></div>

  <script src="app.js"></script>
</body>
</html>
